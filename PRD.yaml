  - title: Integrate MediaPipe Face Detection for smart reframing
    completed: true
    parallel_group: 1
    description: >
      File: server/src/extraction/reframe.ts


      CURRENT STATE:

      - Line 141-160: detectFacesForReframe() returns empty array with TODO

      - Runs FFmpeg I-frame extraction but doesn't parse face data

      - Always falls back to center crop

      - Smoothing and interpolation code exists but is never used


      IMPLEMENTATION:

      1. Install MediaPipe dependency:
         cd server && bun add @mediapipe/tasks-vision

      2. Replace detectFacesForReframe() implementation:
         - Extract frames at 2 FPS using FFmpeg:
           $`ffmpeg -i ${inputPath} -vf "fps=2" ${tmpDir}/frame-%04d.jpg`
         - For each frame, run MediaPipe FaceDetector:
           import { FaceDetector, FilesetResolver } from '@mediapipe/tasks-vision'
           const vision = await FilesetResolver.forVisionTasks(...)
           const detector = await FaceDetector.createFromOptions(vision, {
             baseOptions: { modelAssetPath: 'face_detection_short_range.tflite' },
             runningMode: 'IMAGE'
           })
         - For each detected face, get bounding box (x, y, width, height)
         - Convert to crop keyframe:
           {
             timestamp: frameNumber / 2,  // 2 FPS
             x: boundingBox.x + boundingBox.width/2,  // face center
             y: boundingBox.y + boundingBox.height/2,
             tracking_method: 'face_detection' as const
           }
         - Return keyframes array

      3. Enable face tracking in pipeline:
         - In server/src/pipeline/stages/reframe.ts line 64, change to:
           faceTracking: true  // was false for MVP

      4. The existing smoothKeyframes() and buildDynamicCropFilter() will handle
      interpolation


      FALLBACK:

      - If MediaPipe fails or no faces detected, fall back to center crop
      (existing behavior)


      ACCEPTANCE CRITERIA:

      - MediaPipe FaceDetector successfully detects faces in test clips

      - Crop keyframes are generated with face center coordinates

      - Face stays centered in 9:16 output video throughout clip

      - Smoothing prevents jittery crop motion

      - Falls back gracefully if no faces detected
  - title: Add multi-face handling and speaker prioritization
    completed: true
    parallel_group: 2
    description: >
      File: server/src/extraction/reframe.ts


      DEPENDS ON: Face detection must be working first


      CURRENT STATE:

      - Face detection returns all detected faces

      - No logic to choose which face to track when multiple are present


      IMPLEMENTATION:

      1. In detectFacesForReframe(), when multiple faces detected:
         - Strategy 1 (simple): Choose largest face by bounding box area
         - Strategy 2 (advanced): Correlate with audio peaks from analysis data
           * Pass audio moments into reframe context
           * Choose face with most "active" appearance during audio peaks
           * Heuristic: face with largest bbox change or most central position

      2. Add face persistence logic:
         - Track face IDs across frames using simple IOU (Intersection Over Union)
         - Maintain consistent tracking of the same person throughout clip
         - Avoid jumping between faces mid-clip

      3. Add config option for multi-face behavior:
         - 'largest': always track largest face (default)
         - 'speaker': correlate with audio (requires audio moment data)
         - 'center': prefer face closest to current frame center

      ACCEPTANCE CRITERIA:

      - When multiple faces detected, crop centers on the largest face

      - Face tracking maintains consistency (doesn't jump to different person)

      - Speaker-detection mode uses audio correlation if enabled

      - Graceful handling if tracked face leaves frame
  - title: Add animation effects to ASS caption generator
    completed: true
