         - Example: x='iw/2-(iw/zoom/2)-FACE_X':y='ih/2-(ih/zoom/2)-FACE_Y'

      4. Add to orchestrator:
         - Insert effects stage between reframe and caption
         - Pass audio moments and face data via context

      5. Make configurable:
         - Add autoZoom: boolean to job settings
         - Add zoomIntensity: 'subtle' | 'medium' | 'strong' (1.2x | 1.3x | 1.5x)

      ACCEPTANCE CRITERIA:

      - Zoom effect activates during audio peaks

      - Zoom is smooth (no jarring jumps)

      - If face detected, zoom centers on face

      - Zoom intensity is configurable

      - Toggle works correctly
