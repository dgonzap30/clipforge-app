  - title: Add hook detection and clip boundary optimization
    completed: true
    parallel_group: 6
    description: |
      Files:
      - server/src/analysis/hooks.ts (NEW FILE)
      - server/src/analysis/fusion.ts

      IMPLEMENTATION:
      1. Create hook detection module (server/src/analysis/hooks.ts):
         - Analyze first 3 seconds of each potential clip
         - Check for strong hooks:
           * Question: transcript starts with "What", "How", "Why", "When"
           * Reaction: starts with "Oh my god", "No way", "Wait", "Holy"
           * Statement: declarative sentence with emotional words
           * Action: verb-first sentence ("Watch this", "Check this out")
         - Score hook quality (0-100)

      2. Penalize weak hooks:
         - Mid-sentence starts: reduce score by 30%
         - Silence/dead air in first 2s: reduce score by 40%
         - Filler words as first word: reduce score by 20%

      3. Optimize clip boundaries:
         - Adjust startTime to align with sentence boundaries
         - Move backward up to 2 seconds to catch full context
         - Ensure clip starts on a strong word (not "um", "uh", "and")

      4. Optimize clip endings:
         - End on completed thought (sentence boundary)
         - Avoid cutting mid-sentence unless natural pause
         - Add 0.5s padding after last word for breathing room

      5. Integrate with fusion:
         - Add hookScore to SignalMoment metadata
         - Boost final hydeScore by hookScore * 0.2 (20% weight)
         - Filter out clips with hookScore < 30

      ACCEPTANCE CRITERIA:
      - Clips start with strong hooks (questions, reactions, statements)
      - Weak hooks are penalized in scoring
      - Clip boundaries align with sentence boundaries
      - No mid-sentence cuts unless intentional
      - Hook scoring improves clip retention metrics
