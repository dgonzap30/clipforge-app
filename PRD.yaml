           zoompan=z='if(between(time,T1,T1+0.5),(time-T1)*0.6+1.0,if(between(time,T1+0.5,T2),1.3,if(between(time,T2,T2+0.5),1.3-(time-T2)*0.6,1.0)))':d=1
