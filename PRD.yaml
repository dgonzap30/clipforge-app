         - Syntax: {\fade(128,0,0,0,0,100)}

      4. Make animations configurable:
         interface CaptionAnimations {
           bounce: boolean
           glow: boolean
           fadeIn: boolean
           intensity: 'subtle' | 'medium' | 'strong'
         }

      5. Update generateTikTokASS signature to accept animations config


      ACCEPTANCE CRITERIA:

      - Bounce effect is visible on highlighted words

      - Glow/outline pulse draws attention to active word

      - Fade-in makes new words appear smoothly

      - Animations can be toggled on/off via config

      - No performance degradation (ASS rendering is hardware-accelerated)
